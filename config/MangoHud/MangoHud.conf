# ============================================================
#  MangoHud config for High on Life 2 performance monitoring
# ============================================================

# --- Overlay display ---
fps
fps_color_change
frame_timing
cpu_stats
cpu_temp
cpu_mhz
gpu_stats
gpu_temp
vram
ram
io_stats
engine_version
wine
vulkan_driver
resolution
show_fps_limit

# --- Position ---
position=top-left
background_alpha=0.5
font_size=20

# --- Logging ---
# Press F2 in-game to start a 600-second (10 min) log
output_folder=/home/glenn/game_logs
log_duration=600
toggle_logging=F2

# --- FPS alert colors (shows red when below 30, yellow below 60) ---
fps_color=00ff00
fps_value=60,30

# --- Frame time graph ---
frame_timing=1
