# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Darkened background (overrides theme wallpaper on boot)
exec-once = swaybg -i ~/.config/omarchy/current/theme/backgrounds/lixsg_dark.jpg -m fill

# Ollama (GPU via Vulkan — do NOT use systemctl, that runs as user ollama without GPU access)
exec-once = bash -c 'OLLAMA_VULKAN=1 ollama serve'

# Alice startup greeting (time of day, calendar events, etc.)
exec-once = alice-greeting

# KDE Connect daemon (phone integration)
exec-once = kdeconnectd

# Claude Code Web UI server (http://localhost:5173)
exec-once = bash -c 'cd ~/claudecodeui && npm run dev >> /tmp/claudeui.log 2>&1'

# Rainbow border cycler (runs forever, no Hyprland animation loop bug)
exec-once = python3 ~/.config/hypr/rainbow-border.py
