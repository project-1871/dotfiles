format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$cmd_duration $jobs $time\
$line_break\
$character"""

[nodejs]
format = "[$symbol($version )]($style)"

[fill]
symbol = "[´îÜ ţîŻ ´ĺŁ  ţśş ţśž ţŁĚ  ţÖŽ ţśĄ ţś┤  ´î¬  ţťś ´ë░ ţÜę ţťĚ ´îÜ  ´î¬  ´îÜ ţîŻ ´ĺŁ  ţśş ţśž ţŁĚ  ţÖŽ ţśĄ ţś┤  ´î¬  ţťś ´ë░ ţÜę ţťĚ ´îÜ]"

[directory]
style = "red"
read_only = " ´áŻ"
truncation_length = 4
truncate_to_repo = false

[character]
success_symbol = "[´îÜ](purple)"
error_symbol = "[´îÜ](red)"
vicmd_symbol = "[´îÜ](green)"

[git_branch]
symbol = "´Éś "
format = "[$symbol$branch]($style) "
style = "bright-black"

[jobs]
symbol = "´Çô"
style = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
disabled = false

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[memory_usage]
symbol = "´íÜ "

[rust]
symbol = "ţ×Ę "

[time]
disabled = false
style = "bold red"
format = "[$time]($style)"

[custom.stunnel]
when = "ps aux | grep stunnel | grep -v grep"
command = "ps -o etime= -p $(ps aux | grep stunnel | grep -v grep | awk '{print $2}')"
style = "red"
format = "[TUNNEL OPEN for $output]($style)"